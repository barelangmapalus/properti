<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#2c3e50">
  
  <title>Detail Properti - BMpro</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .detail-page { padding-bottom: 20px; }
    .detail-header {
      position: sticky;
      top: 0;
      background: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      z-index: 100;
    }
    .back-btn {
      color: var(--primary);
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f0f0f0;
      text-decoration: none;
    }
    .detail-header h2 { font-size: 1rem; font-weight: 600; flex: 1; }
    .loading { text-align: center; padding: 60px 20px; }
    .loading i { font-size: 2rem; color: var(--secondary, #3498db); margin-bottom: 12px; }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state i { font-size: 3rem; color: #ccc; margin-bottom: 16px; }
    .detail-main-image { position: relative; width: 100%; height: 320px; background: #f0f0f0; }
    .detail-main-image img { width: 100%; height: 100%; object-fit: cover; }
    .image-counter { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
    .detail-thumbnails { display: flex; gap: 8px; padding: 12px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
    .thumbnail { width: 70px; height: 70px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 2px solid transparent; opacity: 0.7; }
    .thumbnail.active { border-color: var(--secondary, #3498db); opacity: 1; }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .detail-info { padding: 20px; background: white; }
    .detail-price { font-size: 1.6rem; font-weight: 700; color: var(--secondary, #3498db); margin-bottom: 8px; }
    .detail-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; color: #2c3e50; }
    .detail-location { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 16px; }
    .detail-location i { margin-right: 6px; }
    .detail-features { display: flex; gap: 20px; padding: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
    .detail-feature { text-align: center; flex: 1; }
    .detail-feature i { font-size: 1.3rem; color: var(--secondary, #3498db); margin-bottom: 5px; }
    .detail-feature .value { font-weight: 700; font-size: 1rem; }
    .detail-feature .label { font-size: 0.7rem; color: #7f8c8d; }
    .detail-description { padding: 20px; background: white; margin-top: 10px; }
    .detail-description h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; color: #2c3e50; }
    .detail-description p { font-size: 0.8rem; color: #555; line-height: 1.5; }
    .detail-specs { padding: 20px; background: white; margin-top: 10px; display: flex; flex-direction: column; gap: 12px; }
    .spec-item { display: flex; justify-content: space-between; font-size: 0.8rem; }
    .spec-label { color: #7f8c8d; }
    .spec-value { font-weight: 500; color: #2c3e50; }
    .detail-contact { padding: 20px; background: white; margin-top: 10px; margin-bottom: 80px; }
    .contact-buttons { display: flex; gap: 12px; }
    .btn-call, .btn-wa { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 40px; text-decoration: none; font-weight: 500; font-size: 0.85rem; }
    .btn-call { background: #2c3e50; color: white; }
    .btn-wa { background: #25D366; color: white; }
  </style>
</head>
<body>
  <div class="detail-page">
    <div class="detail-header">
      <a href="javascript:history.back()" class="back-btn"><i class="fas fa-arrow-left"></i></a>
      <h2 id="detailTitle">Detail Properti</h2>
      <div style="width: 36px;"></div>
    </div>
    <div id="detailContent">
      <div class="loading"><i class="fas fa-spinner fa-pulse"></i><p>Memuat detail properti...</p></div>
    </div>
  </div>

  <script src="js/script.js"></script>
  
  <script>
    // =====================================================
    // KONFIGURASI
    // =====================================================
    const SHEET_ID = '1mosLZD23_3YDcuzi2diUY2TRNBSigJ2HNiiiFGPWtzo';
    const SHEETS = ['primary', 'secondary', 'rent'];
    
    let allImages = [];
    
    // Ambil ID dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const imageId = urlParams.get('id');
    
    // =====================================================
    // FUNGSI FORMAT RUPIAH
    // =====================================================
    function formatPrice(price) {
      if (!price) return 'Rp 0';
      let num = parseInt(price.toString().replace(/[^0-9]/g, ''));
      if (isNaN(num)) return 'Rp 0';
      return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(num);
    }
    
    // =====================================================
    // FUNGSI KONVERSI NOMOR WA
    // =====================================================
    function convertToWaNumber(phone) {
      if (!phone) return '';
      let cleaned = phone.toString().replace(/[^0-9]/g, '');
      if (cleaned.startsWith('0')) cleaned = '62' + cleaned.substring(1);
      if (!cleaned.startsWith('62') && cleaned.length > 0) cleaned = '62' + cleaned;
      return cleaned;
    }
    
    // =====================================================
    // FUNGSI KONVERSI URL DRIVE
    // =====================================================
    function convertDriveUrl(url) {
      if (!url) return '';
      const match = url.match(/[?&]id=([^&]+)/);
      if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}=w800`;
      return url;
    }
    
    // =====================================================
    // MENCARI PROPERTI BERDASARKAN ID GAMBAR
    // =====================================================
    async function loadDetail() {
      if (!imageId) {
        showError('ID properti tidak ditemukan');
        return;
      }
      
      try {
        let foundProperty = null;
        let foundCategory = '';
        
        for (const sheetName of SHEETS) {
          const url = `https://opensheet.elk.sh/${SHEET_ID}/${sheetName}`;
          const response = await fetch(url);
          const data = await response.json();
          
          if (data && data.length > 0) {
            const property = data.find(row => {
              const g1 = row['gambar utama'] || '';
              const g2 = row['gambar2'] || '';
              const g3 = row['gambar3'] || '';
              const g4 = row['gambar4'] || '';
              const g5 = row['gambar5'] || '';
              return g1.includes(imageId) || g2.includes(imageId) || g3.includes(imageId) || g4.includes(imageId) || g5.includes(imageId);
            });
            
            if (property && property['nama property'] && property['nama property'].trim() !== '') {
              foundProperty = property;
              foundCategory = sheetName;
              break;
            }
          }
        }
        
        if (foundProperty) {
          foundProperty._tab = foundCategory;
          displayDetail(foundProperty);
        } else {
          showError('Data properti tidak ditemukan');
        }
        
      } catch (error) {
        showError('Gagal memuat data properti');
      }
    }
    
    // =====================================================
    // MENAMPILKAN DETAIL
    // =====================================================
    function displayDetail(property) {
      allImages = [];
      if (property['gambar utama']) allImages.push(convertDriveUrl(property['gambar utama']));
      if (property['gambar2']) allImages.push(convertDriveUrl(property['gambar2']));
      if (property['gambar3']) allImages.push(convertDriveUrl(property['gambar3']));
      if (property['gambar4']) allImages.push(convertDriveUrl(property['gambar4']));
      if (property['gambar5']) allImages.push(convertDriveUrl(property['gambar5']));
      
      document.getElementById('detailTitle').textContent = property['nama property'] || 'Detail Properti';
      
      const content = document.getElementById('detailContent');
      content.innerHTML = `
        <div class="detail-main-image">
          <img src="${allImages[0] || 'https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=600'}" id="mainImage">
          ${allImages.length > 1 ? `<span class="image-counter" id="imageCounter">1/${allImages.length}</span>` : ''}
        </div>
        ${allImages.length > 1 ? `
          <div class="detail-thumbnails">
            ${allImages.map((img, i) => `<div class="thumbnail ${i === 0 ? 'active' : ''}" onclick="changeImage(${i})"><img src="${img}"></div>`).join('')}
          </div>
        ` : ''}
        <div class="detail-info">
          <div class="detail-price">${formatPrice(property['harga'])}</div>
          <h2 class="detail-title">${escapeHtml(property['nama property'] || '-')}</h2>
          <div class="detail-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(property['lokasi'] || '-')}</div>
          <div class="detail-features">
            <div class="detail-feature"><i class="fas fa-bed"></i><div class="value">${property['kt'] || '0'}</div><div class="label">Kamar Tidur</div></div>
            <div class="detail-feature"><i class="fas fa-bath"></i><div class="value">${property['km'] || '0'}</div><div class="label">Kamar Mandi</div></div>
            <div class="detail-feature"><i class="fas fa-layer-group"></i><div class="value">${property['lt'] || '0'}</div><div class="label">Lantai</div></div>
          </div>
        </div>
        ${property['spesifikasi'] ? `<div class="detail-description"><h3>Deskripsi</h3><p>${escapeHtml(property['spesifikasi'])}</p></div>` : ''}
        <div class="detail-specs">
          <div class="spec-item"><span class="spec-label">Kategori</span><span class="spec-value">${property._tab || 'primary'}</span></div>
          <div class="spec-item"><span class="spec-label">Sales</span><span class="spec-value">${escapeHtml(property['sales'] || '-')}</span></div>
          <div class="spec-item"><span class="spec-label">Kontak</span><span class="spec-value">${escapeHtml(property['kontak'] || '-')}</span></div>
        </div>
        <div class="detail-contact">
          <h3>Hubungi Marketing</h3>
          <div class="contact-buttons">
            <a href="tel:${property['kontak'] || ''}" class="btn-call"><i class="fas fa-phone"></i> Telepon</a>
            <a href="https://wa.me/${convertToWaNumber(property['kontak'])}?text=Halo, saya tertarik dengan properti ${encodeURIComponent(property['nama property'] || '')}" class="btn-wa" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
          </div>
        </div>
      `;
    }
    
    function changeImage(index) {
      document.getElementById('mainImage').src = allImages[index];
      document.querySelectorAll('.thumbnail').forEach((t, i) => t.classList.toggle('active', i === index));
      const c = document.getElementById('imageCounter');
      if (c) c.textContent = `${index + 1}/${allImages.length}`;
    }
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[m]));
    }
    
    function showError(msg) {
      document.getElementById('detailContent').innerHTML = `
        <div class="empty-state"><i class="fas fa-exclamation-triangle"></i><p>${msg}</p><a href="index.html" style="display:inline-block;margin-top:16px;color:var(--secondary);">Kembali ke Beranda</a></div>
      `;
    }
    
    loadDetail();
  </script>
</body>
</html>
