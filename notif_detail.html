<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <meta name="theme-color" content="#2c3e50">
  
  <title>Detail Properti - BMpro</title>
  
  <!-- Font Awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <!-- CSS Global -->
  <link rel="stylesheet" href="css/style.css">
  
  <style>
    .detail-page { padding-bottom: 20px; }
    .detail-header {
      position: sticky;
      top: 0;
      background: white;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
      z-index: 100;
    }
    .back-btn {
      color: var(--primary);
      font-size: 1.2rem;
      width: 36px;
      height: 36px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 50%;
      background: #f0f0f0;
      text-decoration: none;
    }
    .detail-header h2 { font-size: 1rem; font-weight: 600; flex: 1; }
    .loading { text-align: center; padding: 60px 20px; }
    .loading i { font-size: 2rem; color: var(--secondary, #3498db); margin-bottom: 12px; }
    .empty-state { text-align: center; padding: 60px 20px; }
    .empty-state i { font-size: 3rem; color: #ccc; margin-bottom: 16px; }
    .detail-main-image { position: relative; width: 100%; height: 320px; background: #f0f0f0; }
    .detail-main-image img { width: 100%; height: 100%; object-fit: cover; }
    .image-counter { position: absolute; bottom: 12px; right: 12px; background: rgba(0,0,0,0.6); color: white; padding: 4px 10px; border-radius: 20px; font-size: 0.7rem; }
    .detail-thumbnails { display: flex; gap: 8px; padding: 12px; overflow-x: auto; background: white; border-bottom: 1px solid #eee; }
    .thumbnail { width: 70px; height: 70px; border-radius: 12px; overflow: hidden; cursor: pointer; border: 2px solid transparent; opacity: 0.7; }
    .thumbnail.active { border-color: var(--secondary, #3498db); opacity: 1; }
    .thumbnail img { width: 100%; height: 100%; object-fit: cover; }
    .detail-info { padding: 20px; background: white; }
    .detail-price { font-size: 1.6rem; font-weight: 700; color: var(--secondary, #3498db); margin-bottom: 8px; }
    .detail-title { font-size: 1.2rem; font-weight: 600; margin-bottom: 6px; color: #2c3e50; }
    .detail-location { font-size: 0.8rem; color: #7f8c8d; margin-bottom: 16px; }
    .detail-location i { margin-right: 6px; }
    .detail-features { display: flex; gap: 20px; padding: 15px 0; border-top: 1px solid #eee; border-bottom: 1px solid #eee; }
    .detail-feature { text-align: center; flex: 1; }
    .detail-feature i { font-size: 1.3rem; color: var(--secondary, #3498db); margin-bottom: 5px; }
    .detail-feature .value { font-weight: 700; font-size: 1rem; }
    .detail-feature .label { font-size: 0.7rem; color: #7f8c8d; }
    .detail-description { padding: 20px; background: white; margin-top: 10px; }
    .detail-description h3 { font-size: 0.9rem; font-weight: 600; margin-bottom: 10px; color: #2c3e50; }
    .detail-description p { font-size: 0.8rem; color: #555; line-height: 1.5; }
    .detail-specs { padding: 20px; background: white; margin-top: 10px; display: flex; flex-direction: column; gap: 12px; }
    .spec-item { display: flex; justify-content: space-between; font-size: 0.8rem; }
    .spec-label { color: #7f8c8d; }
    .spec-value { font-weight: 500; color: #2c3e50; }
    .detail-contact { padding: 20px; background: white; margin-top: 10px; margin-bottom: 80px; }
    .contact-buttons { display: flex; gap: 12px; }
    .btn-call, .btn-wa { flex: 1; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 12px; border-radius: 40px; text-decoration: none; font-weight: 500; font-size: 0.85rem; }
    .btn-call { background: #2c3e50; color: white; }
    .btn-wa { background: #25D366; color: white; }

    .detail-viewer {
      font-size: 13px;
      color: #777;
      margin-top: 4px;
      margin-bottom: 10px;
    }

    .posted-date{
    padding: 10px 16px 6px;
    font-size: 11px;
    color: #777;
    font-weight: 500;
    }

    .youtube-preview{
  padding:14px 16px 4px;
  background:#fff;
}

.youtube-frame{
  position:relative;
  width:100%;
  padding-top:56.25%;
  border-radius:16px;
  overflow:hidden;
  background:#000;
}

.youtube-frame iframe{
  position:absolute;
  top:0;
  left:0;
  width:100%;
  height:100%;
}

  </style>
</head>
<body>
  <div class="detail-page">
    <div class="detail-header">
      <a href="index.html" class="back-btn" onclick="handleBack(event)">
        <i class="fas fa-arrow-left"></i>
      </a>
      <h2 id="detailTitle">Detail Properti</h2>
      <div style="width: 36px;"></div>
    </div>
    <div id="detailContent">
      <div class="loading"><i class="fas fa-spinner fa-pulse"></i><p>Memuat detail properti...</p></div>
    </div>
  </div>

  <!-- JS Global dari website Anda -->
  <script src="js/script.js"></script>
  
  <!-- JS Khusus untuk notif_detail.html (WA Notification) -->
  <script>
  const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbx4qXEG_UdM4j3SYeZ5k46dkmpy-CdCAMVqjDd2145Y0xIHvQ3b4VRWsahSVqWVlLAD/exec';

  (function() {
    // 🔥 PERUBAHAN 1: Ambil property_id dari URL
    const urlParams = new URLSearchParams(window.location.search);
    const propertyId = urlParams.get('id');
    
    let allImages = [];
    let foundProperty = null;
    let foundCategory = '';
    
    const SHEETS = ['primary', 'secondary', 'rent'];
    
    function showError(message) {
      document.getElementById('detailContent').innerHTML = `
        <div class="empty-state">
          <i class="fas fa-exclamation-triangle"></i>
          <p>${message}</p>
          <p style="font-size:12px; margin-top:10px;">Property ID: ${propertyId || 'tidak ada'}</p>
          <a href="index.html" style="display:inline-block;margin-top:16px;color:var(--secondary);">Kembali ke Beranda</a>
        </div>
      `;
    }
    
    function displayDetail(property, category) {
      // Kumpulkan gambar
      allImages = [];
      if (property['gambar utama']) allImages.push(convertDriveUrl(property['gambar utama']));
      if (property['gambar2']) allImages.push(convertDriveUrl(property['gambar2']));
      if (property['gambar3']) allImages.push(convertDriveUrl(property['gambar3']));
      if (property['gambar4']) allImages.push(convertDriveUrl(property['gambar4']));
      if (property['gambar5']) allImages.push(convertDriveUrl(property['gambar5']));
      
      if (allImages.length === 0) {
        allImages = ['https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=600'];
      }
      
      document.getElementById('detailTitle').textContent = property['nama property'] || 'Detail Properti';
      
      const content = document.getElementById('detailContent');
      const rawTimestamp = property.timestamp || '';
      const date = new Date(rawTimestamp);
      const formattedDate = date.toLocaleString('id-ID', {
        day: '2-digit',
        month: 'long',
        year: 'numeric',
        hour: '2-digit',
        minute: '2-digit',
        timeZone: 'Asia/Jakarta'
      }) + ' WIB';
      
      let thumbnailHtml = '';
      if (allImages.length > 1) {
        thumbnailHtml = `<div class="detail-thumbnails">
          ${allImages.map((img, i) => `
            <div class="thumbnail ${i === 0 ? 'active' : ''}" onclick="window.changeImage(${i})">
              <img src="${img}" alt="Thumbnail ${i+1}">
            </div>
          `).join('')}
        </div>`;
      }
      
      content.innerHTML = `
        <div class="posted-date">
          Diposting ${formattedDate.replace(',', ' •')}
        </div>
        <div class="detail-main-image">
          <img src="${allImages[0]}" alt="${escapeHtml(property['nama property'])}" id="mainImage" onerror="this.src='https://images.unsplash.com/photo-1580587771525-78b9dba3b914?w=600'">
          ${allImages.length > 1 ? `<span class="image-counter" id="imageCounter">1/${allImages.length}</span>` : ''}
        </div>
        ${property['youtube'] ? `
          <div class="youtube-preview">
            <div class="youtube-frame">
              <iframe src="${convertYoutubeEmbed(property['youtube'])}" title="Video Properti" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe>
            </div>
          </div>
        ` : ''}
        ${thumbnailHtml}
        <div class="detail-info">
          <div class="detail-price">${formatPrice(property['harga'])}</div>
          <h2 class="detail-title">${escapeHtml(property['nama property'] || '-')}</h2>
          <div class="detail-viewer">👁️ <span id="viewerCount">${property['viewer'] || '0'}</span>x dilihat</div>
          <div class="detail-location"><i class="fas fa-map-marker-alt"></i> ${escapeHtml(property['lokasi'] || '-')}</div>
          <div class="detail-features">
            <div class="detail-feature"><i class="fas fa-bed"></i><div class="value">${property['kt'] || '0'}</div><div class="label">Kamar Tidur</div></div>
            <div class="detail-feature"><i class="fas fa-bath"></i><div class="value">${property['km'] || '0'}</div><div class="label">Kamar Mandi</div></div>
            <div class="detail-feature"><i class="fas fa-layer-group"></i><div class="value">${property['lt'] || '0'}</div><div class="label">Luas Tanah</div></div>
          </div>
        </div>
        ${property['spesifikasi'] ? `
          <div class="detail-description">
            <h3>Deskripsi</h3>
            <p>${escapeHtml(property['spesifikasi'])}</p>
          </div>
        ` : ''}
        <div class="detail-specs">
          <div class="spec-item"><span class="spec-label">Kategori</span><span class="spec-value">${category || property._tab || 'primary'}</span></div>
          <div class="spec-item"><span class="spec-label">Sales</span><span class="spec-value">${escapeHtml(property['sales'] || '-')}</span></div>
          <div class="spec-item"><span class="spec-label">Kontak</span><span class="spec-value">${escapeHtml(property['kontak'] || '-')}</span></div>
        </div>
        <div class="detail-contact">
          <h3 style="margin-bottom:12px;">Hubungi Marketing</h3>
          <div class="contact-buttons">
            <a href="tel:${property['kontak'] || ''}" class="btn-call"><i class="fas fa-phone"></i> Telepon</a>
            <a href="https://wa.me/${convertToWaNumber(property['kontak'])}?text=Halo, saya tertarik dengan properti ${encodeURIComponent(property['nama property'] || '')}" class="btn-wa" target="_blank"><i class="fab fa-whatsapp"></i> WhatsApp</a>
          </div>
        </div>
      `;
    }
    
    window.changeImage = function(index) {
      if (!allImages[index]) return;
      document.getElementById('mainImage').src = allImages[index];
      const thumbnails = document.querySelectorAll('.thumbnail');
      thumbnails.forEach((thumb, i) => {
        thumb.classList.toggle('active', i === index);
      });
      const counter = document.getElementById('imageCounter');
      if (counter) counter.textContent = `${index + 1}/${allImages.length}`;
    };
    
    function escapeHtml(str) {
      if (!str) return '';
      return str.replace(/[&<>]/g, function(m) {
        if (m === '&') return '&amp;';
        if (m === '<') return '&lt;';
        if (m === '>') return '&gt;';
        return m;
      });
    }
    
    function convertYoutubeEmbed(url) {
      if (!url) return '';
      let videoId = '';
      if (url.includes('youtu.be/')) {
        videoId = url.split('youtu.be/')[1].split('?')[0];
      } else if (url.includes('watch?v=')) {
        videoId = url.split('watch?v=')[1].split('&')[0];
      } else if (url.includes('/embed/')) {
        videoId = url.split('/embed/')[1].split('?')[0];
      }
      return `https://www.youtube.com/embed/${videoId}`;
    }
    
    async function loadDetail() {
      console.log('🔍 Mencari properti dengan property_id:', propertyId);
      
      if (!propertyId) {
        showError('ID properti tidak ditemukan');
        return;
      }
      
      try {
        for (const sheetName of SHEETS) {
          console.log(`📁 Mengecek sheet: ${sheetName}`);
          const data = await fetchSheetData(sheetName);
          
          if (data && data.length > 0) {
            // 🔥 PERUBAHAN 2: Cari berdasarkan property_id
            const property = data.find(row => row['property_id'] === propertyId);
            
            if (property && property['nama property'] && property['nama property'].trim() !== '') {
              foundProperty = property;
              foundCategory = sheetName;
              console.log(`✅ Properti ditemukan di ${sheetName}: ${property['nama property']}`);
              break;
            }
          }
        }
        
        if (foundProperty) {
          // Tampilkan detail dulu
          displayDetail(foundProperty, foundCategory);
          
          // 🔥 PERUBAHAN 3: Update viewer dengan property_id
          try {
            const propertyKey = `${foundProperty['nama property']}_${foundCategory}_${propertyId}`;
            const viewerKey = `bmpro_viewed_${propertyKey}`;
            const alreadyViewed = localStorage.getItem(viewerKey);
            
            if (!alreadyViewed) {
              localStorage.setItem(viewerKey, 'true');
              
              fetch(SCRIPT_URL, {
                method: 'POST',
                headers: {
                  'Content-Type': 'application/x-www-form-urlencoded'
                },
                body: new URLSearchParams({
                  action: 'incrementViewer',
                  category: foundCategory,
                  property_id: propertyId
                })
              })
              .then(res => res.json())
              .then(result => {
                console.log('👁️ Viewer updated:', result);
                foundProperty['viewer'] = parseInt(foundProperty['viewer'] || 0) + 1;
                const viewerEl = document.getElementById('viewerCount');
                if (viewerEl) viewerEl.textContent = foundProperty['viewer'];
              })
              .catch(err => console.log('❌ Viewer gagal:', err));
            } else {
              console.log('👁️ Viewer tidak ditambah karena sudah pernah melihat property ini');
            }
          } catch(err) {
            console.log('❌ Error viewer:', err);
          }
        } else {
          console.log(`❌ Properti dengan property_id "${propertyId}" tidak ditemukan`);
          showError('Data properti tidak ditemukan');
        }
      } catch (error) {
        console.error('❌ Error:', error);
        showError('Gagal memuat data properti');
      }
    }
    
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', loadDetail);
    } else {
      loadDetail();
    }
    
    window.handleBack = function(event) {
      event.preventDefault();
      if (window.history.length > 1) {
        window.history.back();
      } else {
        window.location.href = 'index.html';
      }
    };
  })();
</script>
</body>
</html>
